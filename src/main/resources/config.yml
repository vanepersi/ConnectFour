# Connect Four — giant wall board, red vs yellow
# Classic grid: 7 columns × 6 rows. Data folder: plugins/GenesiCore/games/ConnectFour/

# Lobby countdown once both seats are filled (seconds)
lobby-countdown-seconds: 5

# Pre-game countdown after both players are ready (seconds)
start-countdown-seconds: 3

# Optional Vault entry fee charged on join
entry-fee: 0.0

# Arcade points (stored in points.yml under GenesiCore/games/ConnectFour/)
points-win: 3
points-draw: 1

# Who goes first: yellow | red | random | first-join
first-turn: yellow

# Return players to lobby when the round ends
teleport-on-end: true

# Drop animation: ticks between each row as the disc falls (0 = instant)
drop-ticks-per-row: 2

# How long winning discs flash before the board resets (ticks)
win-highlight-ticks: 60

# Reset board delay after a finished game (ticks)
reset-delay-ticks: 80

# ---------------------------------------------------------------------------
# Materials — closest Minecraft look to real Connect Four
# Blue plastic frame is part of your build; plugin only paints the slots.
# RED/YELLOW_CONCRETE = solid discs (high contrast, no gravity surprises).
# Empty slots default to AIR so the blue frame holes stay see-through.
# ---------------------------------------------------------------------------
materials:
  empty: AIR
  red: RED_CONCRETE
  yellow: YELLOW_CONCRETE
  # Temporary flash material on a winning line
  win-highlight: GLOWSTONE

# Default cell size when creating arenas (blocks per disc). Giant boards use 2–3.
board-defaults:
  columns: 7
  rows: 6
  cell-width: 1
  cell-height: 1
  # Extra air/blocks between cells (0 = adjacent)
  column-gap: 0
  row-gap: 0

# Arcade points rewards
reward:
  deposit-to-vault: false
  # Placeholders: {player} {uuid} {points} {arena} {result}
  commands: []

